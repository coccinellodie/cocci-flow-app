  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brown:     #977A5C;
      --brown-dk:  #4C320D;
      --rose:      #B69A94;
      --rose-lt:   #CEA39B;
      --rose-dk:   #9a6e68;
      --green:     #8BA288;
      --green-dk:  #243D1F;
      --bg:        #FAF7F2;
      --card:      #FFFFFF;
      --soft:      #F3EDE6;
      --soft-rose: #F8F2F0;
      --text:      #2D1810;
      --muted:     #9C8880;
      --border:    rgba(151,122,92,0.18);
    }
    html, body { height: 100%; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); max-width: 430px; margin: 0 auto; min-height: 100vh; -webkit-font-smoothing: antialiased; }

    /* HEADER */
    .header { padding: 52px 24px 14px; background: linear-gradient(180deg, rgba(182,154,148,0.14) 0%, transparent 100%); }
    .header-row { display: flex; align-items: flex-start; justify-content: space-between; }
    .day-name { font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 400; line-height: 1; color: var(--green-dk); letter-spacing: -0.01em; }
    .date-sub { font-size: 13px; color: var(--muted); margin-top: 5px; font-weight: 300; }
    /* TIMER BANNER */
    .timer-banner { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--green-dk); color: white; padding: 12px 20px; display: flex; align-items: center; gap: 10px; z-index: 200; }
    .timer-title { flex: 1; font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .timer-time { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; min-width: 54px; text-align: center; }
    .timer-done { font-size: 11px; opacity: 0.7; text-align: center; }
    .timer-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    /* TABS (bottom nav) */
    .tabs { display: flex; padding: 0; border-top: 1px solid var(--border); border-bottom: none; background: var(--bg); position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; z-index: 20; padding-bottom: env(safe-area-inset-bottom, 0px); }
    .tab { flex: 1; padding: 10px 6px 12px; border: none; background: none; font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 400; color: var(--muted); cursor: pointer; border-top: 2px solid transparent; margin-top: -1px; transition: color 0.2s, border-color 0.2s; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .tab.active { color: var(--rose-dk); border-top-color: var(--rose); font-weight: 500; }
    .tab-icon { font-size: 18px; line-height: 1; }

    /* CALENDAR STRIP */
    .cal-header { padding: 52px 24px 0; background: linear-gradient(180deg, rgba(182,154,148,0.14) 0%, transparent 100%); }
    .cal-month-row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 16px; }
    .cal-day-big { font-family: 'Cormorant Garamond', serif; font-size: 40px; font-weight: 400; color: var(--green-dk); line-height: 1; letter-spacing: -0.01em; }
    .cal-month-label { font-size: 12px; color: var(--muted); font-weight: 300; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.1em; }
    .cal-nav { display: flex; gap: 8px; align-items: center; }
    .cal-nav-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
    .cal-nav-btn:active { background: var(--soft); }
    .cal-dots-btn { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px 8px; letter-spacing: 2px; line-height: 1; -webkit-tap-highlight-color: transparent; transition: color 0.15s; }
    .cal-dots-btn:hover { color: var(--text); }
    .week-strip { display: flex; justify-content: space-between; padding: 0 24px 4px; }

    /* MONTH CALENDAR SHEET */
    .month-sheet { background: var(--bg); width: 100%; max-width: 430px; margin: 0 auto; border-radius: 24px 24px 0 0; padding: 20px 20px 44px; animation: slideUp 0.28s cubic-bezier(0.34,1.36,0.64,1); max-height: 88vh; overflow-y: auto; }
    .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .month-nav-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; color: var(--green-dk); font-weight: 400; }
    .month-grid-wrap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .month-dow { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); text-align: center; padding: 4px 0 10px; }
    .month-cell-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 2px 0; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .month-cell { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 14px; font-weight: 400; color: var(--text); transition: all 0.15s; }
    .month-cell.other-month { color: var(--muted); opacity: 0.35; }
    .month-cell.is-today { color: var(--rose-dk); font-weight: 600; border: 1.5px solid var(--rose); }

    fetch(PROXY_URL + '/tasks').then(r => r.json());

    fetch(PROXY_URL + '/tasks', {

  function useVoice() {
    const [listening, setListening] = useState(false);
    const recRef = useRef(null);
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const start = (onResult) => {
      if (!SR) return false;
      const r = new SR();
      recRef.current = r;
      r.lang = 'fr-FR'; r.interimResults = false; r.maxAlternatives = 1;
      r.onstart  = () => setListening(true);
      r.onresult = (e) => { setListening(false); onResult(e.results[0][0].transcript); };
      r.onerror  = () => setListening(false);
      r.onend    = () => setListening(false);
      r.start(); return true;
    };
    const stop = () => { if (recRef.current) recRef.current.stop(); setListening(false); };
    return { listening, supported: !!SR, start, stop };
  }

  // ── TASK CARD ──────────────────────────────────────
  function TaskCard({ task, allCats, onToggle, onMenu, showDate, dragRef, onDrop }) {
    const pKey = task.priority.toLowerCase();
    const cats = (task.categories||[]).map(id => allCats.find(c=>c.id===id)).filter(Boolean);
    const cardRef  = useRef(null);
    const touchRef = useRef(null);

    // ── Desktop ──────────────────────────────────────
    const handleDragStart = (e) => {
      if (task.done) { e.preventDefault(); return; }
      if (dragRef) dragRef.current = { taskId: task.id };
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', task.id);
      setTimeout(() => cardRef.current && cardRef.current.classList.add('dragging'), 0);
    };
    const handleDragEnd = () => {
      cardRef.current && cardRef.current.classList.remove('dragging');
      if (dragRef) dragRef.current = null;
    };

    // ── Mobile touch ─────────────────────────────────
    useEffect(() => {
      const el = cardRef.current;
      if (!el) return;

      const LONG_PRESS_MS = 380; // délai avant activation du glisser

      const cleanupTouch = () => {
        const ts = touchRef.current;
        if (!ts) return;
        clearTimeout(ts.timer);
        // Supprime le ghost s'il existe (cas touchcancel ou sortie inattendue)
        if (ts.ghost) { try { ts.ghost.remove(); } catch(e) {} }
        if (ts.dragging) {
          el.classList.remove('dragging');
          document.querySelectorAll('[data-drop-zone]').forEach(dz => dz.classList.remove('drop-zone-over'));
          if (dragRef) dragRef.current = null;
        }
        el.style.transform  = '';
        el.style.transition = '';
        touchRef.current = null;
        // Filet de sécurité : supprime tout ghost orphelin dans la page
        document.querySelectorAll('#drag-ghost').forEach(g => { try { g.remove(); } catch(e) {} });
      };

      const cancelTouch = cleanupTouch;

      const onTouchStart = (e) => {
        if (task.done || e.touches.length !== 1) return;
        const touch = e.touches[0];
        touchRef.current = {
          taskId: task.id, dragging: false, ready: false, ghost: null,
          startX: touch.clientX, startY: touch.clientY, timer: null,
          rect: null, // rect capturé AVANT le scale, pour un positionnement exact
        };
        touchRef.current.timer = setTimeout(() => {
          if (!touchRef.current) return;
          // Capture rect avant d'appliquer le scale — sinon getBoundingClientRect() renvoie
          // une valeur décalée et le ghost apparaît au mauvais endroit
          touchRef.current.rect  = el.getBoundingClientRect();
          touchRef.current.ready = true;
          el.style.transition = 'transform 0.12s';
          el.style.transform  = 'scale(0.96)';
        }, LONG_PRESS_MS);
      };

      const onTouchMove = (e) => {
        const ts = touchRef.current;
        if (!ts) return;
        const touch = e.touches[0];
        const dx = touch.clientX - ts.startX, dy = touch.clientY - ts.startY;
        const dist = Math.sqrt(dx*dx + dy*dy);

        // Pas encore activé → scroll normal, mais annule si trop de mouvement
        if (!ts.ready) {
          if (dist > 6) cancelTouch();
          return;
        }

        // Drag activé → bloque le scroll de la page dès maintenant
        e.preventDefault();

        if (!ts.dragging && dist < 4) return;

        if (!ts.dragging) {
          el.style.transform  = '';
          el.style.transition = '';
          // Utilise le rect pré-scale stocké au moment du long-press
          const rect = ts.rect || el.getBoundingClientRect();
          const ghost = el.cloneNode(true);
          ghost.id = 'drag-ghost';
          ghost.removeAttribute('draggable');
          ghost.style.cssText = [
            'position:fixed',
            'top:' + rect.top + 'px',
            'left:' + rect.left + 'px',
            'width:' + rect.width + 'px',
            'margin:0',
            'pointer-events:none',
            'z-index:9999',
            'opacity:0.85',
            'transform:none',
            'transition:none',
            'box-shadow:0 8px 24px rgba(0,0,0,0.16)',
            'border-radius:14px',
          ].join(';') + ';';
          document.body.appendChild(ghost);
          ts.ghost   = ghost;
          ts.offsetX = touch.clientX - rect.left;
          ts.offsetY = touch.clientY - rect.top;
          ts.dragging = true;
          el.classList.add('dragging');
          if (dragRef) dragRef.current = { taskId: ts.taskId };
        }

        if (ts.ghost) {
          ts.ghost.style.top  = (touch.clientY - ts.offsetY) + 'px';
          ts.ghost.style.left = (touch.clientX - ts.offsetX) + 'px';
        }
        document.querySelectorAll('[data-drop-zone]').forEach(dz => {
          const r = dz.getBoundingClientRect();
          dz.classList.toggle('drop-zone-over',
            touch.clientX >= r.left && touch.clientX <= r.right &&
            touch.clientY >= r.top  && touch.clientY <= r.bottom
          );
        });
      };

      const onTouchEnd = (e) => {
        const ts = touchRef.current;
        if (!ts) return;
        if (!ts.dragging) { cleanupTouch(); return; }
        const touch = e.changedTouches[0];
        const taskId = ts.taskId;
        // Nettoie tout avant elementFromPoint (ghost pointer-events:none mais on retire quand même)
        cleanupTouch();
        // Trouve la zone de dépôt sous le doigt
        let target = document.elementFromPoint(touch.clientX, touch.clientY);
        while (target && target !== document.body) {
          if (target.dataset && target.dataset.dropZone) {
            const [type, value] = target.dataset.dropZone.split(':');
            if (onDrop) onDrop(taskId, type, value);
            break;
          }
          target = target.parentElement;
        }
      };

      const onTouchCancel = () => cancelTouch();

      el.addEventListener('touchstart',  onTouchStart,  { passive: true });
      el.addEventListener('touchmove',   onTouchMove,   { passive: false });
      el.addEventListener('touchend',    onTouchEnd,    { passive: true });
      el.addEventListener('touchcancel', onTouchCancel, { passive: true });
      return () => {
        el.removeEventListener('touchstart',  onTouchStart);
        el.removeEventListener('touchmove',   onTouchMove);
        el.removeEventListener('touchend',    onTouchEnd);
        el.removeEventListener('touchcancel', onTouchCancel);
      };
    }, [task.id, task.done]);

    return (
      <div
        ref={cardRef}
        className={`task-card p-${pKey} ${task.done?'done':''}`}
        draggable={!task.done}
        onDragStart={handleDragStart}
        onDragEnd={handleDragEnd}
      >
        <button className={`task-check ${task.done?'checked':''}`} onClick={() => onToggle(task.id)}>
          {task.done && <span className="check-icon">✓</span>}
        </button>
        <div className="task-body">
          <div className={`task-title ${task.done?'done-text':''}`}>{task.title}</div>
          <div className="task-meta">
            <span className="task-dur">⏱ {fmtDur(task.duration)}</span>
            <span className={`task-chip chip-${pKey}`}>{task.priority}</span>
            {showDate && task.scheduledDate && <span className="chip-sched">📅 {fmtDateLabel(task.scheduledDate)}</span>}
            {cats.map(c => <span key={c.id} className="chip-cat">{c.icon} {c.label}</span>)}
          </div>
        </div>
        <button className="task-menu-btn" onClick={() => onMenu(task)}>···</button>
      </div>
    );
  }

  // ── SLOT SECTION (day view) ────────────────────────
  function SlotSection({ slot, tasks, allCats, onToggle, onMenu, onAddToSlot, dragRef, onDrop }) {
    const [open, setOpen] = useState(true);
    const [over, setOver] = useState(false);
    const t = todayKey();
    const undone    = tasks.filter(tk => !tk.done);
    const doneToday = tasks.filter(tk => tk.done && tk.doneDate===t);
    const allDone   = undone.length===0 && doneToday.length>0;
    const visible   = [...undone, ...doneToday];

    const handleDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; setOver(true); };
    const handleDragLeave = (e) => { if (!e.currentTarget.contains(e.relatedTarget)) setOver(false); };
    const handleDrop = (e) => {
      e.preventDefault();
      setOver(false);
      const taskId = e.dataTransfer.getData('text/plain') || dragRef?.current?.taskId;
      if (taskId && onDrop) onDrop(taskId, 'slot', slot.id);
    };

    return (
      <div
        className={`slot-section drop-zone ${over ? 'drop-zone-over' : ''}`}
        data-drop-zone={`slot:${slot.id}`}
        onDragOver={handleDragOver}
        onDragLeave={handleDragLeave}
        onDrop={handleDrop}
      >
        <div className="slot-header" onClick={() => setOpen(o=>!o)}>
          <span className="slot-icon">{slot.icon}</span>
          <span className="slot-name" style={{color:slot.color}}>{slot.label}</span>
          <span className="slot-count" style={{background:slot.bg, color:slot.color}}>{undone.length}</span>
          <span className={`slot-chevron ${open?'open':''}`}>›</span>
        </div>
        {open && <>
          {allDone && <div className="celebration">✨ Tout terminé !</div>}
          {visible.map(t => <TaskCard key={t.id} task={t} allCats={allCats} onToggle={onToggle} onMenu={onMenu} dragRef={dragRef} onDrop={onDrop} />)}
          <button className="slot-add-btn" onClick={() => onAddToSlot(slot.id)}>+ Ajouter ici</button>
        </>}
      </div>
    );
  }

  // ── CALENDAR STRIP + MONTH VIEW ────────────────────
  const MON_FR_UP   = ['JAN.','FÉV.','MAR.','AVR.','MAI','JUIN','JUIL.','AOÛT','SEP.','OCT.','NOV.','DÉC.'];
  const MON_FR_FULL = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const DAY_LETTERS_MON = ['L','M','M','J','V','S','D'];

  function getMonthGrid(year, month) {
    const firstDay = new Date(year, month, 1);
    const lastDay  = new Date(year, month + 1, 0);
    let startDow = firstDay.getDay(); // 0=dim
    startDow = startDow === 0 ? 6 : startDow - 1; // lundi=0
    const cells = [];
    for (let i = startDow - 1; i >= 0; i--) {
      const d = new Date(year, month, -i); cells.push({ d, other: true });
    }
    for (let d = 1; d <= lastDay.getDate(); d++) {
      cells.push({ d: new Date(year, month, d), other: false });
    }
    const rem = 7 - (cells.length % 7);
    if (rem < 7) for (let d = 1; d <= rem; d++) cells.push({ d: new Date(year, month+1, d), other: true });
    return cells;
  }

  function MonthCalendarSheet({ selectedDate, onSelectDate, onClose, tasks }) {
    const selD = new Date(selectedDate + 'T12:00:00');
    const [viewYear,  setViewYear]  = useState(selD.getFullYear());
    const [viewMonth, setViewMonth] = useState(selD.getMonth());
    const today = todayKey();

    const prevMonth = () => {
      if (viewMonth === 0) { setViewMonth(11); setViewYear(y=>y-1); }
      else setViewMonth(m=>m-1);
    };
    const nextMonth = () => {
      if (viewMonth === 11) { setViewMonth(0); setViewYear(y=>y+1); }
      else setViewMonth(m=>m+1);
    };

    const cells = getMonthGrid(viewYear, viewMonth);

    const handleSelect = (cell) => {
      const key = localKey(cell.d);
      onSelectDate(key);
      onClose();
    };

    return (
      <div className="sheet-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
        <div className="month-sheet">
          <div className="sheet-handle"/>
          <div className="month-nav">
            <button className="cal-nav-btn" onClick={prevMonth}>‹</button>
            <div className="month-nav-title">{MON_FR_FULL[viewMonth]} {viewYear}</div>
            <button className="cal-nav-btn" onClick={nextMonth}>›</button>
          </div>
          <div className="month-grid-wrap">
            {DAY_LETTERS_MON.map((l,i) => <div key={i} className="month-dow">{l}</div>)}
            {cells.map((cell, i) => {
              const key = localKey(cell.d);
              const isSel = key === selectedDate;
              const isTod = key === today;
              const hasTasks = tasks.some(t => t.scheduledDate === key && !t.done);
              return (
                <div key={i} className="month-cell-wrap" onClick={() => handleSelect(cell)}>
                  <div className={`month-cell ${cell.other?'other-month':''} ${isTod&&!isSel?'is-today':''} ${isSel?(isTod?'is-today is-selected':'is-selected'):''}`}>
                    {cell.d.getDate()}
                  </div>
                  {hasTasks ? <div className={`month-cell-dot ${isSel?'selected-dot':''}`}/> : <div style={{width:4,height:4}}/>}
                </div>
              );
            })}
          </div>
          <button className="btn-secondary" style={{marginTop:16}} onClick={onClose}>Fermer</button>
        </div>
      </div>
    );
  }

  function CalendarStrip({ selectedDate, onSelectDate, tasks }) {
    const [weekOffset,    setWeekOffset]    = useState(0);
    const [showMonthView, setShowMonthView] = useState(false);

    const getWeekStart = (offset) => {
      const d = new Date();
      const dow = d.getDay();
      const toMon = dow === 0 ? -6 : 1 - dow;
      d.setDate(d.getDate() + toMon + offset * 7);
      d.setHours(0,0,0,0);
      return d;
    };

    const weekStart = getWeekStart(weekOffset);
    const days = Array.from({length:7}, (_, i) => {
      const d = new Date(weekStart);
      d.setDate(weekStart.getDate() + i);
      const key = localKey(d);
      return { key, letter: DAY_LETTERS_MON[i], num: d.getDate(), isToday: key === todayKey(), hasTasks: tasks.some(t => t.scheduledDate === key && !t.done) };
    });

    const selD = new Date(selectedDate + 'T12:00:00');
    const monthLabel = `${MON_FR_UP[selD.getMonth()]} ${selD.getFullYear()}`;

    return (
      <>
        <div>
          <div className="cal-header">
            <div className="cal-month-row">
              <div>
                <div className="cal-month-label">{monthLabel}</div>
                <div className="cal-day-big">{DAY_FR[selD.getDay()]}</div>
              </div>
              <div className="cal-nav">
                <button className="cal-dots-btn" onClick={() => setShowMonthView(true)} title="Vue mois">···</button>
                <button className="cal-nav-btn" onClick={() => setWeekOffset(o=>o-1)}>‹</button>
                {weekOffset !== 0 && <button className="cal-nav-btn" style={{fontSize:11,width:'auto',padding:'0 10px',borderRadius:10}} onClick={() => { setWeekOffset(0); onSelectDate(todayKey()); }}>auj.</button>}
                <button className="cal-nav-btn" onClick={() => setWeekOffset(o=>o+1)}>›</button>
              </div>
            </div>
          </div>
          <div className="week-strip">
            {days.map(d => (
              <div key={d.key} className="day-pill" onClick={() => onSelectDate(d.key)}>
                <span className="day-pill-letter">{d.letter}</span>
                <span className={`day-pill-num ${d.isToday&&d.key!==selectedDate?'is-today':''} ${d.key===selectedDate?(d.isToday?'is-today is-selected':'is-selected'):''}`}>{d.num}</span>
                {d.hasTasks && d.key!==selectedDate ? <div className="day-pill-dot"/> : <div className="day-pill-dot-placeholder"/>}
              </div>
            ))}
          </div>
        </div>
        {showMonthView && (
          <MonthCalendarSheet
            selectedDate={selectedDate}
            onSelectDate={onSelectDate}
            onClose={() => setShowMonthView(false)}
            tasks={tasks}
          />
        )}
      </>
    );
  }

  // ── DAY VIEW ───────────────────────────────────────
  function DayView({ tasks, allCats, onToggle, onMenu, onAddToSlot, selectedDate, dragRef, onDrop }) {
    const t = selectedDate;
    const scheduled = tasks.filter(tk => tk.scheduledDate===t)
      .sort((a, b) => (b.createdAt||'').localeCompare(a.createdAt||''));
    const hasAny = scheduled.length > 0;
    return (
      <div className="content">
        {!hasAny ? (
          <div className="empty">
            <div className="empty-icon">📅</div>
            <div className="empty-text">Rien de planifié ce jour-là.<br/>Va dans "À faire" pour planifier tes tâches.</div>
          </div>
        ) : (
          SLOTS.map(slot => (
            <SlotSection key={slot.id} slot={slot} allCats={allCats}
              tasks={scheduled.filter(t => t.slot===slot.id)}
              onToggle={onToggle} onMenu={onMenu} onAddToSlot={onAddToSlot}
              dragRef={dragRef} onDrop={onDrop}
            />
          ))
        )}
      </div>
    );
  }

  // ── PRIO SECTION (collapsible) ────────────────────
  function PrioSection({ priority, tasks, allCats, onToggle, onMenu, dragRef, onDrop }) {
    const [open, setOpen] = useState(false);
    const [over, setOver] = useState(false);

    const handleDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; setOver(true); if (!open) setOpen(true); };
    const handleDragLeave = (e) => { if (!e.currentTarget.contains(e.relatedTarget)) setOver(false); };
    const handleDrop = (e) => {
      e.preventDefault();
      setOver(false);
      const taskId = e.dataTransfer.getData('text/plain') || dragRef?.current?.taskId;
      if (taskId && onDrop) onDrop(taskId, 'priority', priority);
    };

    return (
      <div
        className={`drop-zone ${over ? 'drop-zone-over' : ''}`}
        data-drop-zone={`priority:${priority}`}
        onDragOver={handleDragOver}
        onDragLeave={handleDragLeave}
        onDrop={handleDrop}
        style={{borderRadius:14, minHeight: over ? 60 : 'auto'}}
      >
        <div
          className="prio-header"
          onClick={() => setOpen(o => !o)}
          style={{cursor:'pointer', userSelect:'none', WebkitTapHighlightColor:'transparent'}}
        >
          <div className="prio-dot" style={{background:PRIO_COLORS[priority]}}/>
          <span className="prio-name">{priority}</span>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span className="prio-count">{tasks.length}</span>
            <span style={{color:'var(--muted)',fontSize:13,transition:'transform 0.2s',display:'inline-block',transform:open?'rotate(180deg)':'none',lineHeight:1}}>⌄</span>
          </div>
        </div>
        {(open || over) && tasks.map(t => <TaskCard key={t.id} task={t} allCats={allCats} onToggle={onToggle} onMenu={onMenu} showDate dragRef={dragRef} onDrop={onDrop} />)}
        {over && tasks.length === 0 && <div style={{height:40,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)',fontSize:13}}>Déposer ici</div>}
      </div>
    );
  }

  // ── BACKLOG VIEW ───────────────────────────────────
  function BacklogView({ tasks, allCats, onToggle, onMenu, dragRef, onDrop }) {
    const [catFilter,   setCatFilter]   = useState(null);
    const [openPending, setOpenPending] = useState(true);

    // Toutes les tâches non faites, triées du plus récent au plus ancien
    const pending  = tasks.filter(tk => !tk.done)
      .sort((a, b) => (b.createdAt||'').localeCompare(a.createdAt||''));
    const usedCats = allCats.filter(c => pending.some(t => (t.categories||[]).includes(c.id)));

    const applyFilter = (list) => catFilter ? list.filter(t => (t.categories||[]).includes(catFilter)) : list;

    return (
      <div className="content">
        {/* Filtre catégories */}
        {usedCats.length > 0 && (
          <div className="cat-filter-row">
            <button className={`cat-filter-chip ${!catFilter?'active':''}`} onClick={() => setCatFilter(null)}>Toutes</button>
            {usedCats.map(c => (
              <button key={c.id} className={`cat-filter-chip ${catFilter===c.id?'active':''}`}
                onClick={() => setCatFilter(catFilter===c.id ? null : c.id)}>{c.icon} {c.label}</button>
            ))}
          </div>
        )}

        {/* Section "À faire" dépliable */}
        {pending.length > 0 && (
          <div>
            <div
              onClick={() => setOpenPending(o => !o)}
              style={{display:'flex',alignItems:'center',gap:8,padding:'14px 0 6px',cursor:'pointer',userSelect:'none',WebkitTapHighlightColor:'transparent'}}
            >
              <span style={{fontSize:11,fontWeight:500,textTransform:'uppercase',letterSpacing:'0.12em',color:'var(--text)'}}>À faire</span>
              <span style={{fontSize:12,color:'var(--muted)',background:'var(--soft)',borderRadius:10,padding:'1px 7px'}}>{pending.length}</span>
              <span style={{color:'var(--muted)',fontSize:13,marginLeft:'auto',transition:'transform 0.2s',display:'inline-block',transform:openPending?'rotate(180deg)':'none'}}>⌄</span>
            </div>
            {openPending && PRIORITIES.map(p => {
              const pts = applyFilter(pending).filter(t => t.priority === p);
              return <PrioSection key={p} priority={p} tasks={pts} allCats={allCats} onToggle={onToggle} onMenu={onMenu} dragRef={dragRef} onDrop={onDrop} />;
            })}
          </div>
        )}

        {pending.length === 0 && (
          <div className="empty" style={{paddingTop:32}}>
            <div className="empty-icon">🌿</div>
            <div className="empty-text">Tout est fait !<br/>Va dans "Fait" pour savourer ✓</div>
          </div>
        )}
      </div>
    );
  }

  // ── DONE VIEW ──────────────────────────────────────
  function DoneView({ tasks, allCats, onToggle, onMenu }) {
    const [showHistory, setShowHistory] = useState(false);

    const today = todayKey();
    const yDay  = ydayKey();

    const allDone   = tasks.filter(tk => tk.done).sort((a,b) => (b.doneDate||'').localeCompare(a.doneDate||''));
    // Tâches faites aujourd'hui (fallback si doneDate null mais done=true)
    const todayDone = allDone.filter(t => t.doneDate === today);
    const histDone  = allDone.filter(t => t.doneDate !== today && t.doneDate);
    const total     = todayDone.length;

    // Regrouper historique par date (uniquement les dates valides)
    const byDate = {};
    histDone.forEach(t => {
      const k = t.doneDate;
      if (!byDate[k]) byDate[k] = [];
      byDate[k].push(t);
    });
    const dates = Object.keys(byDate).sort((a,b) => b.localeCompare(a));

    const dayLabel = (key) => {
      if (!key) return '';
      if (key === today) return "Aujourd'hui";
      if (key === yDay)  return 'Hier';
      const d = new Date(key + 'T12:00:00');
      if (isNaN(d.getTime())) return '';
      return `${DAY_FR[d.getDay()]} ${d.getDate()} ${MON_FR[d.getMonth()]}`;
    };

    const heroMessage = () => {
      if (total === 0) return 'La journée commence…';
      if (total < 3)  return 'Bien lancée 🌱';
      if (total < 6)  return 'Belle énergie ✨';
      if (total < 10) return 'Tu carbures ! 🔥';
      return 'Journée de guerrière 🏆';
    };

    return (
      <div className="content" style={{paddingTop:0}}>
        {/* Compteur héro */}
        <div className="done-hero">
          <div className="done-counter-ring">
            <div className="done-counter-num">{total}</div>

  // ── APP ────────────────────────────────────────────
  function App() {
    const [tasks,        setTasks]        = useState(() => migrateTasks(load(KEYS.tasks, [])));
    const [customCats,   setCustomCats]   = useState(() => load(KEYS.cats, []));
    const [tab,          setTab]          = useState('backlog');
    const [selectedDate, setSelectedDate] = useState(todayKey);
    const [showForm,   setShowForm]   = useState(false);
    const [editTask,   setEditTask]   = useState(null);
    const [ctxTask,    setCtxTask]    = useState(null);
    const [planTask,   setPlanTask]   = useState(null);
    const [defSlot,    setDefSlot]    = useState(null);
    const [defDate,    setDefDate]    = useState(null);
    const [prefill,    setPrefill]    = useState('');
    const [timer,      setTimer]      = useState(null);
    const [syncing,    setSyncing]    = useState(false);
    const timerRef = useRef(null);
    const dragRef   = useRef(null);
    const { listening: voiceOn, supported: voiceOk, start: voiceStart, stop: voiceStop } = useVoice();

    const allCats      = [...DEFAULT_CATS, ...customCats];
    const customCatIds = customCats.map(c=>c.id);

    useEffect(() => { save(KEYS.tasks, tasks); }, [tasks]);
    useEffect(() => { save(KEYS.cats, customCats); }, [customCats]);

    // Chargement initial depuis Notion
    useEffect(() => {
      if (!PROXY_URL) return;
      setSyncing(true);
      notionGet()
        .then(data => {
          if (Array.isArray(data)) {
            setTasks(data);
            save(KEYS.tasks, data);
            // Récupère les définitions de catégories custom manquantes depuis les tâches Notion
            setCustomCats(prev => {
              const knownIds = new Set([
                ...DEFAULT_CATS.map(c => c.id),
                ...prev.map(c => c.id),
              ]);
              const recovered = [];
              data.forEach(task => {
                // Nouvelles tâches avec _catDefs (format enrichi)
                if (task._catDefs) {
                  Object.entries(task._catDefs).forEach(([id, meta]) => {
                    if (!knownIds.has(id)) {
                      recovered.push({ id, icon: meta.icon || '🏷️', label: meta.label || id });
                      knownIds.add(id);
                    }
                  });
                }
                // Anciens IDs bruts (custom_TIMESTAMP) sans définition connue
                (task.categories || []).forEach(id => {
                  if (id.startsWith('custom_') && !knownIds.has(id)) {
                    recovered.push({ id, icon: '🏷️', label: '(sans nom)' });
                    knownIds.add(id);
                  }
                });
              });
              if (!recovered.length) return prev;
              const merged = [...prev, ...recovered];
              save(KEYS.cats, merged);
              return merged;
            });
          }
        })
        .catch(() => {})
        .finally(() => setSyncing(false));
    }, []);

    // Sync une tâche vers Notion (create ou update)
    // Inclut _catDefs pour que les catégories custom soient lisibles dans Notion
    const syncTask = useCallback(async (task) => {
      if (!PROXY_URL) return;
      const catDefMap = {};
      (task.categories || []).forEach(id => {
        const cat = customCats.find(c => c.id === id);
        if (cat) catDefMap[id] = { icon: cat.icon, label: cat.label };
      });
      const taskToSync = Object.keys(catDefMap).length
        ? { ...task, _catDefs: catDefMap }
        : task;
      try {
        if (task.notionId) {
          await notionUpdate(task.notionId, taskToSync);
        } else {
          const created = await notionCreate(taskToSync);
          if (created?.notionId) {
            setTasks(prev => prev.map(t =>
              t.id === task.id ? { ...t, notionId: created.notionId } : t
            ));
          }
        }
      } catch(e) { /* offline — localStorage garde la mise à jour */ }
    }, [customCats]);

    // Auto-escalade : tâches non faites dont la date est passée → backlog Haute priorité + sync Notion
    useEffect(() => {
      const t = todayKey();
      const toSync = [];
      setTasks(prev => {
        let changed = false;
        const updated = prev.map(task => {
          if (!task.done && task.scheduledDate && task.scheduledDate < t) {
            changed = true;
            const upd = { ...task, scheduledDate: null, priority: 'Haute' };
            toSync.push(upd);
            return upd;
          }
          return task;
        });
        if (!changed) return prev;
        // Sync vers Notion sans bloquer le rendu
        if (PROXY_URL) {
          toSync.forEach(task => {
            if (task.notionId) notionUpdate(task.notionId, task).catch(() => {});
          });
        }
        return updated;
      });
    }, []);

    // Timer tick
    useEffect(() => {
      if (!timer || timer.paused || timer.remaining<=0) { clearInterval(timerRef.current); return; }
      timerRef.current = setInterval(() => {
        setTimer(p => p && p.remaining>0 ? {...p, remaining: p.remaining-1} : p);
      }, 1000);
      return () => clearInterval(timerRef.current);
    }, [timer?.paused, timer?.taskId, !!timer]);

    const handleToggle = useCallback((id) => {
      setTasks(prev => {
        const task = prev.find(t=>t.id===id); if(!task) return prev;
        const newDone = !task.done;
        const updated = {...task, done:newDone, doneDate:newDone?todayKey():null};
        syncTask(updated);
        return prev.map(t => t.id===id ? updated : t);
      });
    }, [syncTask]);

    const handleSaveTask = useCallback((task) => {
      setTasks(prev => {
        const exists = prev.find(t=>t.id===task.id);
        syncTask(task);
        return exists ? prev.map(t=>t.id===task.id?task:t) : [...prev,task];
      });
    }, [syncTask]);

    const handleDelete = useCallback((id) => {
      setTasks(prev => {
        const task = prev.find(t=>t.id===id);
        if (task?.notionId && PROXY_URL) notionDelete(task.notionId).catch(()=>{});
        return prev.filter(t=>t.id!==id);
      });
    }, []);

    const handleMove = useCallback((taskId, type, value) => {
      setTasks(prev => {
        const task = prev.find(t => t.id === taskId);
        if (!task) return prev;
        let updated;
        if (type === 'slot') {
          if (task.slot === value) return prev;
          updated = { ...task, slot: value };
        } else if (type === 'priority') {
          if (task.priority === value) return prev;
          updated = { ...task, priority: value };
        } else return prev;
        syncTask(updated);
        return prev.map(t => t.id === taskId ? updated : t);
      });
    }, [syncTask]);

    const handleDuplicate = useCallback((task) => {
      const copy = {...task, id:Date.now().toString(36)+Math.random().toString(36).slice(2), notionId:undefined, done:false, doneDate:null, scheduledDate:null, createdAt:new Date().toISOString()};
      setTasks(prev => [...prev, copy]);
      syncTask(copy);
    }, [syncTask]);

    const handlePlanify = useCallback((taskId, date, slot) => {
      setTasks(prev => {
        const updated = prev.map(t => t.id===taskId ? {...t, scheduledDate:date, slot:slot||t.slot} : t);
        const task = updated.find(t=>t.id===taskId);
        if (task) syncTask(task);
        return updated;
      });
    }, [syncTask]);

    const handleStartTimer = useCallback((task) => {
      setTimer({ taskId:task.id, taskTitle:task.title, remaining:task.duration*60, total:task.duration*60, paused:false });
    }, []);

    const handleAddCustomCat    = useCallback((cat) => setCustomCats(p=>[...p,cat]), []);
    const handleDeleteCustomCat = useCallback((id) => {
      setCustomCats(p=>p.filter(c=>c.id!==id));
      setTasks(p=>p.map(t=>({...t,categories:(t.categories||[]).filter(c=>c!==id)})));
    }, []);

    const openAdd = (slot=null, date=null) => { setDefSlot(slot); setDefDate(date); setEditTask(null); setPrefill(''); setShowForm(true); };

    const handleVoiceFab = () => {
      if (voiceOn) { voiceStop(); return; }
      const ok = voiceStart(text => { setPrefill(text); setDefSlot('Flexible'); setDefDate(null); setEditTask(null); setShowForm(true); });
      if (!ok) alert("Reconnaissance vocale non disponible.\nEssaie Chrome desktop ou Android Chrome.");
    };

    return (
      <div style={{paddingTop: timer ? 56 : 0}}>
        {timer && (
          <TimerBanner timer={timer}
            onPause={() => setTimer(p=>({...p,paused:!p.paused}))}
            onFinish={() => { handleToggle(timer.taskId); setTimer(null); }}
            onCancel={() => setTimer(null)}
          />
        )}

        {voiceOn && (
          <div className="listen-overlay">
            <div className="listen-ring">🎙️</div>
            <div className="listen-text">J'écoute…</div>
            <div className="listen-hint">Dis le titre de ta tâche</div>
            <button className="listen-cancel" onClick={voiceStop}>Annuler</button>
          </div>
        )}

        {tab==='day' && <CalendarStrip selectedDate={selectedDate} onSelectDate={setSelectedDate} tasks={tasks} />}
        {(tab==='backlog' || tab==='fait') && (
          <div className="header">
            <div className="header-row">
              <div>
                <div className="day-name">{tab==='fait' ? 'Fait' : 'Mes tâches'}</div>
                <div className="date-sub">{getDayName()} {getDateStr()}</div>
              </div>
              {syncing && (
                <div style={{fontSize:11,color:'var(--muted)',display:'flex',alignItems:'center',gap:5,marginTop:8}}>
                  <span style={{display:'inline-block',animation:'spin 1s linear infinite'}}>↻</span> sync…
                </div>
              )}
            </div>
          </div>
        )}

        {tab==='day'     && <DayView tasks={tasks} allCats={allCats} onToggle={handleToggle} onMenu={setCtxTask} onAddToSlot={s=>openAdd(s,selectedDate)} selectedDate={selectedDate} dragRef={dragRef} onDrop={handleMove} />}
        {tab==='backlog' && <BacklogView tasks={tasks} allCats={allCats} onToggle={handleToggle} onMenu={setCtxTask} dragRef={dragRef} onDrop={handleMove} />}
        {tab==='fait'    && <DoneView tasks={tasks} allCats={allCats} onToggle={handleToggle} onMenu={setCtxTask} />}

        <div className="tabs">
          {[{id:'day',label:'Planning',icon:'📅'},{id:'backlog',label:'À faire',icon:'✦'},{id:'fait',label:'Fait',icon:'✓'}].map(t=>(
            <button key={t.id} className={`tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
              <span className="tab-icon">{t.icon}</span>
              {t.label}
            </button>
          ))}
        </div>

        <div className="fab-area">
          {voiceOk && (
            <button className={`fab-voice ${voiceOn?'listening':''}`} onClick={handleVoiceFab}>
              {voiceOn?'🎙️':'🎤'}
              <span className="fab-voice-label">Parler</span>
            </button>
          )}
          <button className="fab" onClick={()=>tab==='day'?openAdd(null,selectedDate):openAdd()}>+</button>
        </div>

        {ctxTask && (
          <ContextMenu task={ctxTask}
            onClose={() => setCtxTask(null)}
            onPlanify={() => setPlanTask(ctxTask)}
            onUnschedule={() => handlePlanify(ctxTask.id, null, ctxTask.slot)}
            onEdit={() => { setEditTask(ctxTask); setShowForm(true); }}
            onDuplicate={() => handleDuplicate(ctxTask)}
            onStartTimer={() => handleStartTimer(ctxTask)}
            onDelete={() => handleDelete(ctxTask.id)}
          />
        )}

        {planTask && (
          <PlanifySheet task={planTask}
            onClose={() => setPlanTask(null)}
            onPlanify={(date, slot) => { handlePlanify(planTask.id, date, slot); setPlanTask(null); }}
          />
        )}

        {showForm && (
          <TaskFormSheet
            initial={editTask ? {...editTask, prefillTitle: prefill||undefined} : (prefill ? {title:prefill} : null)}
            onClose={() => { setShowForm(false); setEditTask(null); setPrefill(''); }}
            onSave={handleSaveTask}
            allCats={allCats}
            customCatIds={customCatIds}
            onAddCustomCat={handleAddCustomCat}
            onDeleteCustomCat={handleDeleteCustomCat}
            defaultSlot={defSlot}
            defaultDate={defDate}
          />
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
