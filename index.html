  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brown:     #977A5C;
      --brown-dk:  #4C320D;
      --rose:      #B69A94;
      --rose-lt:   #CEA39B;
      --rose-dk:   #9a6e68;
      --green:     #8BA288;
      --green-dk:  #243D1F;
      --bg:        #FAF7F2;
      --card:      #FFFFFF;
      --soft:      #F3EDE6;
      --soft-rose: #F8F2F0;
      --text:      #2D1810;
      --muted:     #9C8880;
      --border:    rgba(151,122,92,0.18);
    }
    html, body { height: 100%; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); max-width: 430px; margin: 0 auto; min-height: 100vh; -webkit-font-smoothing: antialiased; }

    /* HEADER */
    .header { padding: 52px 24px 14px; background: linear-gradient(180deg, rgba(182,154,148,0.14) 0%, transparent 100%); }
    .header-row { display: flex; align-items: flex-start; justify-content: space-between; }
    .day-name { font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 400; line-height: 1; color: var(--green-dk); letter-spacing: -0.01em; }
    .date-sub { font-size: 13px; color: var(--muted); margin-top: 5px; font-weight: 300; }
    /* TIMER BANNER */
    .timer-banner { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--green-dk); color: white; padding: 12px 20px; display: flex; align-items: center; gap: 10px; z-index: 200; }
    .timer-title { flex: 1; font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .timer-time { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; min-width: 54px; text-align: center; }
    .timer-done { font-size: 11px; opacity: 0.7; text-align: center; }
    .timer-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    /* TABS (bottom nav) */
    .tabs { display: flex; padding: 0; border-top: 1px solid var(--border); border-bottom: none; background: var(--bg); position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; z-index: 20; padding-bottom: env(safe-area-inset-bottom, 0px); }
    .tab { flex: 1; padding: 10px 6px 12px; border: none; background: none; font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 400; color: var(--muted); cursor: pointer; border-top: 2px solid transparent; margin-top: -1px; transition: color 0.2s, border-color 0.2s; display: flex; flex-direction: column; align-items: center; gap: 2px; }

  const fmtDur   = (m) => m<60 ? `${m} min` : (m%60===0 ? `${m/60}h` : `${Math.floor(m/60)}h${m%60}`);
  const fmtSec   = (s) => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const DAY_FR   = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

      const lbl = i===1 ? 'Demain' : DAY_FR[d.getDay()];

    if (dateKey===t) return "aujourd'hui";
    if (dateKey===y) return 'demain';

  // ── VOICE ──────────────────────────────────────────
  function useVoice() {
    const [listening, setListening] = useState(false);
    const recRef = useRef(null);
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const start = (onResult) => {
      if (!SR) return false;
      const r = new SR();
      recRef.current = r;
      r.lang = 'fr-FR'; r.interimResults = false; r.maxAlternatives = 1;
      r.onstart  = () => setListening(true);
      r.onresult = (e) => { setListening(false); onResult(e.results[0][0].transcript); };
      r.onerror  = () => setListening(false);
      r.onend    = () => setListening(false);
      r.start(); return true;
    };
    const stop = () => { if (recRef.current) recRef.current.stop(); setListening(false); };
    return { listening, supported: !!SR, start, stop };
  }

  // ── CALENDAR STRIP + MONTH VIEW ────────────────────
  const MON_FR_UP   = ['JAN.','FÉV.','MAR.','AVR.','MAI','JUIN','JUIL.','AOÛT','SEP.','OCT.','NOV.','DÉC.'];
  const MON_FR_FULL = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const DAY_LETTERS_MON = ['L','M','M','J','V','S','D'];

  function getMonthGrid(year, month) {
    const firstDay = new Date(year, month, 1);
    const lastDay  = new Date(year, month + 1, 0);
    let startDow = firstDay.getDay(); // 0=dim
    startDow = startDow === 0 ? 6 : startDow - 1; // lundi=0
    const cells = [];
    for (let i = startDow - 1; i >= 0; i--) {
      const d = new Date(year, month, -i); cells.push({ d, other: true });
    }
    for (let d = 1; d <= lastDay.getDate(); d++) {
      cells.push({ d: new Date(year, month, d), other: false });
    }
    const rem = 7 - (cells.length % 7);
    if (rem < 7) for (let d = 1; d <= rem; d++) cells.push({ d: new Date(year, month+1, d), other: true });
    return cells;
  }

  function MonthCalendarSheet({ selectedDate, onSelectDate, onClose, tasks }) {
    const selD = new Date(selectedDate + 'T12:00:00');
    const [viewYear,  setViewYear]  = useState(selD.getFullYear());
    const [viewMonth, setViewMonth] = useState(selD.getMonth());
    const today = todayKey();

    const prevMonth = () => {
      if (viewMonth === 0) { setViewMonth(11); setViewYear(y=>y-1); }
      else setViewMonth(m=>m-1);
    };
    const nextMonth = () => {
      if (viewMonth === 11) { setViewMonth(0); setViewYear(y=>y+1); }
      else setViewMonth(m=>m+1);
    };

    const cells = getMonthGrid(viewYear, viewMonth);

    const handleSelect = (cell) => {
      const key = localKey(cell.d);
      onSelectDate(key);
      onClose();
    };

    return (
      <div className="sheet-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
        <div className="month-sheet">
          <div className="sheet-handle"/>
          <div className="month-nav">
            <button className="cal-nav-btn" onClick={prevMonth}>‹</button>
            <div className="month-nav-title">{MON_FR_FULL[viewMonth]} {viewYear}</div>
            <button className="cal-nav-btn" onClick={nextMonth}>›</button>
          </div>
          <div className="month-grid-wrap">
            {DAY_LETTERS_MON.map((l,i) => <div key={i} className="month-dow">{l}</div>)}
            {cells.map((cell, i) => {
              const key = localKey(cell.d);
              const isSel = key === selectedDate;
              const isTod = key === today;
              const hasTasks = tasks.some(t => t.scheduledDate === key && !t.done);
              return (
                <div key={i} className="month-cell-wrap" onClick={() => handleSelect(cell)}>
                  <div className={`month-cell ${cell.other?'other-month':''} ${isTod&&!isSel?'is-today':''} ${isSel?(isTod?'is-today is-selected':'is-selected'):''}`}>
                    {cell.d.getDate()}
                  </div>
                  {hasTasks ? <div className={`month-cell-dot ${isSel?'selected-dot':''}`}/> : <div style={{width:4,height:4}}/>}
                </div>
              );
            })}
          </div>
          <button className="btn-secondary" style={{marginTop:16}} onClick={onClose}>Fermer</button>
        </div>
      </div>
    );
  }

  function CalendarStrip({ selectedDate, onSelectDate, tasks }) {
    const [weekOffset,    setWeekOffset]    = useState(0);
    const [showMonthView, setShowMonthView] = useState(false);

    const getWeekStart = (offset) => {
      const d = new Date();
      const dow = d.getDay();
      const toMon = dow === 0 ? -6 : 1 - dow;
      d.setDate(d.getDate() + toMon + offset * 7);
      d.setHours(0,0,0,0);
      return d;
    };

    const weekStart = getWeekStart(weekOffset);
    const days = Array.from({length:7}, (_, i) => {
      const d = new Date(weekStart);
      d.setDate(weekStart.getDate() + i);
      const key = localKey(d);
      return { key, letter: DAY_LETTERS_MON[i], num: d.getDate(), isToday: key === todayKey(), hasTasks: tasks.some(t => t.scheduledDate === key && !t.done) };
    });

    const selD = new Date(selectedDate + 'T12:00:00');
    const monthLabel = `${MON_FR_UP[selD.getMonth()]} ${selD.getFullYear()}`;

    return (
      <>
        <div>
          <div className="cal-header">
            <div className="cal-month-row">
              <div>
                <div className="cal-month-label">{monthLabel}</div>
                <div className="cal-day-big">{DAY_FR[selD.getDay()]}</div>
              </div>
              <div className="cal-nav">
                <button className="cal-dots-btn" onClick={() => setShowMonthView(true)} title="Vue mois">···</button>
                <button className="cal-nav-btn" onClick={() => setWeekOffset(o=>o-1)}>‹</button>
                {weekOffset !== 0 && <button className="cal-nav-btn" style={{fontSize:11,width:'auto',padding:'0 10px',borderRadius:10}} onClick={() => setWeekOffset(0)}>auj.</button>}
                <button className="cal-nav-btn" onClick={() => setWeekOffset(o=>o+1)}>›</button>
              </div>
            </div>
          </div>
          <div className="week-strip">
            {days.map(d => (
              <div key={d.key} className="day-pill" onClick={() => onSelectDate(d.key)}>
                <span className="day-pill-letter">{d.letter}</span>
                <span className={`day-pill-num ${d.isToday&&d.key!==selectedDate?'is-today':''} ${d.key===selectedDate?(d.isToday?'is-today is-selected':'is-selected'):''}`}>{d.num}</span>
                {d.hasTasks && d.key!==selectedDate ? <div className="day-pill-dot"/> : <div className="day-pill-dot-placeholder"/>}
              </div>
            ))}
          </div>
        </div>
        {showMonthView && (
          <MonthCalendarSheet
            selectedDate={selectedDate}
            onSelectDate={onSelectDate}
            onClose={() => setShowMonthView(false)}
            tasks={tasks}
          />
        )}
      </>
    );
  }

  // ── DONE VIEW ──────────────────────────────────────
  function DoneView({ tasks, allCats, onToggle, onMenu }) {
    const [showHistory, setShowHistory] = useState(false);

    const today = todayKey();
    const yDay  = ydayKey();

    const allDone   = tasks.filter(tk => tk.done).sort((a,b) => (b.doneDate||'').localeCompare(a.doneDate||''));
    // Tâches faites aujourd'hui (fallback si doneDate null mais done=true)
    const todayDone = allDone.filter(t => t.doneDate === today);
    const histDone  = allDone.filter(t => t.doneDate !== today && t.doneDate);
    const total     = todayDone.length;

    // Regrouper historique par date (uniquement les dates valides)
    const byDate = {};
    histDone.forEach(t => {
      const k = t.doneDate;
      if (!byDate[k]) byDate[k] = [];
      byDate[k].push(t);
    });
    const dates = Object.keys(byDate).sort((a,b) => b.localeCompare(a));

    const dayLabel = (key) => {
      if (!key) return '';
      if (key === today) return "Aujourd'hui";
      if (key === yDay)  return 'Hier';
      const d = new Date(key + 'T12:00:00');
      if (isNaN(d.getTime())) return '';
      return `${DAY_FR[d.getDay()]} ${d.getDate()} ${MON_FR[d.getMonth()]}`;
    };

    const heroMessage = () => {
      if (total === 0) return 'La journée commence…';
      if (total < 3)  return 'Bien lancée 🌱';
      if (total < 6)  return 'Belle énergie ✨';
      if (total < 10) return 'Tu carbures ! 🔥';
      return 'Journée de guerrière 🏆';
    };

    return (
      <div className="content" style={{paddingTop:0}}>
        {/* Compteur héro */}
        <div className="done-hero">
          <div className="done-counter-ring">
            <div className="done-counter-num">{total}</div>
            <div className="done-counter-label">aujourd'hui</div>
          </div>
          <div className="done-hero-message">{heroMessage()}</div>
        </div>

        {/* Tâches d'aujourd'hui */}
        {todayDone.length === 0 && (
          <div className="empty" style={{paddingTop:0}}>
            <div className="empty-text">Rien de coché aujourd'hui encore.<br/>Coche ta première tâche 🌿</div>
          </div>
        )}
        {todayDone.map(t => (
          <TaskCard key={t.id} task={t} allCats={allCats} onToggle={onToggle} onMenu={onMenu} />
        ))}

        {/* Historique complet (fermé par défaut) */}
        {histDone.length > 0 && (
          <div style={{marginTop:20}}>
            <div
              onClick={() => setShowHistory(o=>!o)}
              style={{display:'flex',alignItems:'center',gap:8,padding:'12px 0',cursor:'pointer',userSelect:'none',WebkitTapHighlightColor:'transparent',borderTop:'1px solid var(--border)'}}
            >
              <span style={{fontSize:11,fontWeight:500,textTransform:'uppercase',letterSpacing:'0.12em',color:'var(--muted)'}}>Tout l'historique</span>
              <span style={{fontSize:12,color:'var(--muted)',background:'var(--soft)',borderRadius:10,padding:'1px 7px'}}>{histDone.length}</span>
              <span style={{color:'var(--muted)',fontSize:13,marginLeft:'auto',transition:'transform 0.2s',display:'inline-block',transform:showHistory?'rotate(180deg)':'none'}}>⌄</span>
            </div>
            {showHistory && dates.map(dateKey => (
              <div key={dateKey} className="done-day-group">
                <div className="done-day-header">
                  <span className="done-day-label">{dayLabel(dateKey)}</span>
                  <span className="done-day-count">{byDate[dateKey].length}</span>
                </div>
                {byDate[dateKey].map(t => (
                  <TaskCard key={t.id} task={t} allCats={allCats} onToggle={onToggle} onMenu={onMenu} />
                ))}
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

                <button key={s.id} className={`chip-sel ${selSlot===s.id?'sel':''}`} onClick={() => setSelSlot(s.id)}>{s.icon} {s.label}</button>
              ))}
            </div>
          </div>
          {task.scheduledDate && (
            <button className="btn-secondary" style={{marginBottom:0}} onClick={() => onPlanify(null, task.slot)}>
              Retirer du planning
            </button>
          )}
          <button className="btn-main" onClick={() => onPlanify(selDate, selSlot)}>Planifier</button>
          <button className="btn-secondary" onClick={onClose}>Annuler</button>
        </div>
      </div>
    );
  }

  // ── CONTEXT MENU ───────────────────────────────────
  function ContextMenu({ task, onClose, onPlanify, onUnschedule, onEdit, onDuplicate, onStartTimer, onDelete }) {
    const opts = [
      { icon: '📅', label: task.scheduledDate ? 'Replanifier' : 'Planifier', action: onPlanify },
      ...(task.scheduledDate ? [{ icon: '↩️', label: 'Remettre dans À faire', action: onUnschedule }] : []),
      { icon: '▶️', label: 'Démarrer la tâche', action: onStartTimer },
      { icon: '📋', label: 'Faire une copie', action: onDuplicate },
      { icon: '✏️', label: 'Modifier la tâche', action: onEdit },
    ];
    return (
      <div className="sheet-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
        <div className="context-sheet">
          <div className="sheet-handle"/>
          <div className="context-task-title">{task.title.length>50?task.title.slice(0,50)+'…':task.title}</div>
          {opts.map(o => (
            <div key={o.label} className="context-option" onClick={() => { o.action(); onClose(); }}>
              <span className="ctx-icon">{o.icon}</span>
              <span className="ctx-label">{o.label}</span>
            </div>
          ))}
          <div className="ctx-divider"/>
          <div className="context-option" onClick={() => { onDelete(); onClose(); }}>
            <span className="ctx-icon">🗑️</span>
            <span className="ctx-label danger">Supprimer la tâche</span>
          </div>
        </div>
      </div>
    );
  }

  // ── TASK FORM SHEET ────────────────────────────────
  function TaskFormSheet({ onClose, onSave, initial, allCats, customCatIds, onAddCustomCat, onDeleteCustomCat, defaultSlot, defaultDate }) {
    const isEdit = !!initial;
    const [title,      setTitle]      = useState(initial?.title || '');
    const [priority,   setPriority]   = useState(initial?.priority || 'Moyenne');
    const [slot,       setSlot]       = useState(initial?.slot || defaultSlot || 'Flexible');
    const [duration,   setDuration]   = useState(initial?.duration || 30);
    const [categories, setCategories] = useState(initial?.categories || []);
    const [notes,      setNotes]      = useState(initial?.notes || '');
    const [customDur,  setCustomDur]  = useState('');
    const [showDurInput, setShowDurInput] = useState(() => initial?.duration && !DURATIONS.includes(initial.duration));
    const [showNewCat, setShowNewCat] = useState(false);
    const [newIcon,    setNewIcon]    = useState('');
    const [newLabel,   setNewLabel]   = useState('');
    const [schedDate,  setSchedDate]  = useState(initial?.scheduledDate || defaultDate || null);
    const [showSched,  setShowSched]  = useState(!!(initial?.scheduledDate || defaultDate));
    const maxSchedDate = (() => { const d=new Date(); d.setMonth(d.getMonth()+6); return localKey(d); })();
    const QUICK_DATES = [
      { key: todayKey(),  label: "Aujourd'hui" },
      { key: addDays(1),  label: 'Demain' },
      { key: addDays(3),  label: 'Dans 3 j.' },
      { key: addDays(7),  label: 'Dans 1 sem.' },
    ];
    const { listening, start, stop }  = useVoice();

    const toggleCat = (id) => setCategories(p => p.includes(id) ? p.filter(c=>c!==id) : [...p,id]);

    const handleMic = () => {
      if (listening) { stop(); return; }
      const ok = start(text => setTitle(t => t ? t+' '+text : text));
      if (!ok) alert("Reconnaissance vocale non disponible. Essaie Chrome sur desktop ou Android.");
    };

    const handleAddCat = () => {
      if (!newLabel.trim()) return;
      const cat = { id:'custom_'+Date.now(), icon: newIcon.trim()||'🏷️', label: newLabel.trim() };
      onAddCustomCat(cat);
      setCategories(p => [...p, cat.id]);
      setNewIcon(''); setNewLabel(''); setShowNewCat(false);
    };

    const handleSave = () => {
      if (!title.trim()) return;
      stop(); // arrêter le micro s'il est encore actif
      const base = isEdit ? { ...initial } : { id: Date.now().toString(36)+Math.random().toString(36).slice(2), done: false, doneDate: null, createdAt: new Date().toISOString(), scheduledDate: showSched ? (schedDate || defaultDate || null) : null };
      onSave({ ...base, title: title.trim(), priority, slot, duration, categories, notes: notes.trim(), scheduledDate: showSched ? (schedDate || defaultDate || null) : (isEdit ? initial.scheduledDate : null) });
      onClose();
    };

    // Stopper le micro si le formulaire se ferme sans sauvegarder
    useEffect(() => () => stop(), []);

    return (
      <div className="sheet-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
        <div className="modal-sheet">
          <div className="modal-handle"/>
          <div className="modal-title">{isEdit ? 'Modifier la tâche' : 'Nouvelle tâche'}</div>
          <div className="form-group">
            <label className="form-label">Titre</label>
            <div className="title-row">
              <input className="form-input" placeholder="Qu'est-ce à faire ?" value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSave()} autoFocus={!initial}/>
              <button type="button" className={`voice-inline-btn ${listening?'listening':''}`} onClick={handleMic}>{listening?'🎙️':'🎤'}</button>
            </div>
            {listening && <div style={{fontSize:12,color:'var(--rose)',marginTop:6,textAlign:'center'}}>J'écoute…</div>}
          </div>
          <div className="form-group">
            <label className="form-label">Priorité</label>
            <div className="chips-row">{PRIORITIES.map(p=><button key={p} className={`chip-sel ${priority===p?'sel':''}`} onClick={()=>setPriority(p)}>{p}</button>)}</div>
          </div>
          <div className="form-group">
            <label className="form-label">Moment préféré</label>
            <div className="chips-row">{SLOTS.map(s=><button key={s.id} className={`chip-sel ${slot===s.id?'sel':''}`} onClick={()=>setSlot(s.id)}>{s.icon} {s.label}</button>)}</div>
          </div>
          <div className="form-group">
            <label className="form-label">Durée estimée</label>
            <div className="chips-row" style={{flexWrap:'wrap'}}>
              {DURATIONS.map(d=>(
                <button key={d} className={`chip-sel ${duration===d&&!showDurInput?'sel':''}`} onClick={()=>{setDuration(d);setShowDurInput(false);setCustomDur('');}}>{fmtDur(d)}</button>
              ))}
              <button className={`chip-sel ${showDurInput?'sel':''}`} onClick={()=>setShowDurInput(true)}>✏️ Autre</button>
            </div>
            {showDurInput && (
              <div style={{display:'flex',gap:8,alignItems:'center',marginTop:10}}>
                <input
                  className="form-input"
                  type="number"
                  min="1"
                  max="480"
                  placeholder="Ex: 75"
                  value={customDur}
                  onChange={e=>{setCustomDur(e.target.value);const v=parseInt(e.target.value);if(v>0)setDuration(v);}}
                  style={{flex:1}}
                  autoFocus
                />
                <span style={{fontSize:13,color:'var(--muted)',whiteSpace:'nowrap'}}>minutes{duration&&showDurInput&&customDur?` = ${fmtDur(duration)}`:''}</span>
              </div>
            )}
          </div>
          <div className="form-group">
            <label className="form-label">Catégories {categories.length>0 && <span style={{color:'var(--green-dk)',marginLeft:6,textTransform:'none',letterSpacing:0,fontStyle:'normal'}}>{categories.length} choisie{categories.length>1?'s':''}</span>}</label>
            <div className="cat-grid">
              {allCats.map(c=>(
                <button key={c.id} className={`cat-chip-btn ${customCatIds.includes(c.id)?'custom':''} ${categories.includes(c.id)?'sel':''}`} onClick={()=>toggleCat(c.id)}>
                  {c.icon} {c.label}
                  {customCatIds.includes(c.id) && <span className="delete-cat" onClick={e=>{e.stopPropagation();onDeleteCustomCat(c.id);setCategories(p=>p.filter(x=>x!==c.id));}}>×</span>}
                </button>
              ))}
              {!showNewCat && <button className="add-cat-btn" onClick={()=>setShowNewCat(true)}>+ Créer</button>}
            </div>
            {showNewCat && (
              <div className="new-cat-form">
                <input className="emoji-input" placeholder="🌟" maxLength={4} value={newIcon} onChange={e=>setNewIcon(e.target.value)} autoFocus/>
                <input className="form-input" placeholder="Nom de la catégorie" value={newLabel} onChange={e=>setNewLabel(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleAddCat()} style={{flex:1}}/>
                <button className="new-cat-confirm" onClick={handleAddCat}>✓</button>
                <button className="new-cat-cancel" onClick={()=>{setShowNewCat(false);setNewIcon('');setNewLabel('');}}>✕</button>
              </div>
            )}
          </div>
          <div className="form-group">
            <label className="form-label">Notes (optionnel)</label>
            <textarea className="form-input form-textarea" placeholder="Quelques détails…" value={notes} onChange={e=>setNotes(e.target.value)}/>
          </div>
          <div className="form-group">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <label className="form-label" style={{marginBottom:0}}>Planifier maintenant ?</label>
              <button
                type="button"
                onClick={() => { setShowSched(o=>!o); if(showSched) setSchedDate(null); }}
                style={{fontSize:12,padding:'4px 12px',borderRadius:20,border:'1px solid var(--border)',background:showSched?'var(--green-dk)':'var(--soft)',color:showSched?'white':'var(--muted)',cursor:'pointer',transition:'all 0.2s'}}
              >{showSched ? '✓ Oui' : 'Non'}</button>
            </div>
            {showSched && (
              <div style={{marginTop:10}}>
                <div className="chips-row" style={{flexWrap:'wrap',marginBottom:8}}>
                  {QUICK_DATES.map(d=>(
                    <button key={d.key} className={`chip-sel ${schedDate===d.key?'sel':''}`} onClick={()=>setSchedDate(d.key)}>{d.label}</button>
                  ))}
                </div>
                <input
                  type="date"
                  className="form-input"
                  value={schedDate||''}
                  min={todayKey()}
                  max={maxSchedDate}
                  onChange={e=>setSchedDate(e.target.value||null)}
                  style={{fontSize:14}}
                />
                {schedDate && <div style={{fontSize:12,color:'var(--green-dk)',marginTop:6,textAlign:'center'}}>📅 {fmtDateLabel(schedDate)}</div>}
              </div>
            )}
          </div>
          <button className="btn-main" onClick={handleSave} disabled={!title.trim()}>{isEdit ? 'Enregistrer' : 'Ajouter la tâche'}</button>
          <button className="btn-secondary" onClick={onClose}>Annuler</button>
        </div>
      </div>
    );
  }

  // ── TIMER BANNER ───────────────────────────────────
  function TimerBanner({ timer, onPause, onFinish, onCancel }) {
    const done = timer.remaining <= 0;
    return (
      <div className="timer-banner">
        <div style={{display:'flex',flexDirection:'column',flex:1,minWidth:0}}>
          <div className="timer-title">{timer.taskTitle}</div>
          {done && <div className="timer-done">Temps écoulé !</div>}
        </div>
        <div className="timer-time">{done ? '00:00' : fmtSec(timer.remaining)}</div>
        {!done && <button className="timer-btn" onClick={onPause}>{timer.paused?'▶':'⏸'}</button>}
        <button className="timer-btn" onClick={done ? onCancel : onFinish} title={done?'Fermer':'Terminer'}>✓</button>
        {!done && <button className="timer-btn" onClick={onCancel} title="Annuler">✕</button>}
      </div>
    );
  }

  // ── APP ────────────────────────────────────────────
  function App() {
    const [tasks,        setTasks]        = useState(() => migrateTasks(load(KEYS.tasks, [])));
    const [customCats,   setCustomCats]   = useState(() => load(KEYS.cats, []));
    const [tab,          setTab]          = useState('backlog');
    const [selectedDate, setSelectedDate] = useState(todayKey);
    const [showForm,   setShowForm]   = useState(false);
    const [editTask,   setEditTask]   = useState(null);
    const [ctxTask,    setCtxTask]    = useState(null);
    const [planTask,   setPlanTask]   = useState(null);
    const [defSlot,    setDefSlot]    = useState(null);
    const [defDate,    setDefDate]    = useState(null);
    const [prefill,    setPrefill]    = useState('');
    const [timer,      setTimer]      = useState(null);
    const [syncing,    setSyncing]    = useState(false);
    const timerRef = useRef(null);
    const { listening: voiceOn, supported: voiceOk, start: voiceStart, stop: voiceStop } = useVoice();

    const allCats      = [...DEFAULT_CATS, ...customCats];
    const customCatIds = customCats.map(c=>c.id);

    useEffect(() => { save(KEYS.tasks, tasks); }, [tasks]);
    useEffect(() => { save(KEYS.cats, customCats); }, [customCats]);

    // Chargement initial depuis Notion
    useEffect(() => {
      if (!PROXY_URL) return;
      setSyncing(true);
      notionGet()
        .then(data => {
          if (Array.isArray(data)) {
            setTasks(data);
            save(KEYS.tasks, data);
            // Récupère les définitions de catégories custom manquantes depuis les tâches Notion
            setCustomCats(prev => {
              const knownIds = new Set([
                ...DEFAULT_CATS.map(c => c.id),
                ...prev.map(c => c.id),
              ]);
              const recovered = [];
              data.forEach(task => {
                // Nouvelles tâches avec _catDefs (format enrichi)
                if (task._catDefs) {
                  Object.entries(task._catDefs).forEach(([id, meta]) => {
                    if (!knownIds.has(id)) {
                      recovered.push({ id, icon: meta.icon || '🏷️', label: meta.label || id });
                      knownIds.add(id);
                    }
                  });
                }
                // Anciens IDs bruts (custom_TIMESTAMP) sans définition connue
                (task.categories || []).forEach(id => {
                  if (id.startsWith('custom_') && !knownIds.has(id)) {
                    recovered.push({ id, icon: '🏷️', label: '(sans nom)' });
                    knownIds.add(id);
                  }
                });
              });
              if (!recovered.length) return prev;
              const merged = [...prev, ...recovered];
              save(KEYS.cats, merged);
              return merged;
            });
          }
        })
        .catch(() => {})
        .finally(() => setSyncing(false));
    }, []);

    // Sync une tâche vers Notion (create ou update)
    // Inclut _catDefs pour que les catégories custom soient lisibles dans Notion
    const syncTask = useCallback(async (task) => {
      if (!PROXY_URL) return;
      const catDefMap = {};
      (task.categories || []).forEach(id => {
        const cat = customCats.find(c => c.id === id);
        if (cat) catDefMap[id] = { icon: cat.icon, label: cat.label };
      });
      const taskToSync = Object.keys(catDefMap).length
        ? { ...task, _catDefs: catDefMap }
        : task;
      try {
        if (task.notionId) {
          await notionUpdate(task.notionId, taskToSync);
        } else {
          const created = await notionCreate(taskToSync);
          if (created?.notionId) {
            setTasks(prev => prev.map(t =>
              t.id === task.id ? { ...t, notionId: created.notionId } : t
            ));
          }
        }
      } catch(e) { /* offline — localStorage garde la mise à jour */ }
    }, [customCats]);

    // Auto-escalade : tâches non faites dont la date est passée → backlog Haute priorité + sync Notion
    useEffect(() => {
      const t = todayKey();
      const toSync = [];
      setTasks(prev => {
        let changed = false;
        const updated = prev.map(task => {
          if (!task.done && task.scheduledDate && task.scheduledDate < t) {
            changed = true;
            const upd = { ...task, scheduledDate: null, priority: 'Haute' };
            toSync.push(upd);
            return upd;
          }
          return task;
        });
        if (!changed) return prev;
        // Sync vers Notion sans bloquer le rendu
        if (PROXY_URL) {
          toSync.forEach(task => {
            if (task.notionId) notionUpdate(task.notionId, task).catch(() => {});
          });
        }
        return updated;
      });
    }, []);

    // Timer tick
    useEffect(() => {
      if (!timer || timer.paused || timer.remaining<=0) { clearInterval(timerRef.current); return; }
      timerRef.current = setInterval(() => {
        setTimer(p => p && p.remaining>0 ? {...p, remaining: p.remaining-1} : p);
      }, 1000);
      return () => clearInterval(timerRef.current);
    }, [timer?.paused, timer?.taskId, !!timer]);

    const handleToggle = useCallback((id) => {
      setTasks(prev => {
        const task = prev.find(t=>t.id===id); if(!task) return prev;
        const newDone = !task.done;
        const updated = {...task, done:newDone, doneDate:newDone?todayKey():null};
        syncTask(updated);
        return prev.map(t => t.id===id ? updated : t);
      });
    }, [syncTask]);

    const handleSaveTask = useCallback((task) => {
      setTasks(prev => {
        const exists = prev.find(t=>t.id===task.id);
        syncTask(task);
        return exists ? prev.map(t=>t.id===task.id?task:t) : [...prev,task];
      });
    }, [syncTask]);

    const handleDelete = useCallback((id) => {
      setTasks(prev => {
        const task = prev.find(t=>t.id===id);
        if (task?.notionId && PROXY_URL) notionDelete(task.notionId).catch(()=>{});
        return prev.filter(t=>t.id!==id);
      });
    }, []);

    const handleDuplicate = useCallback((task) => {
      const copy = {...task, id:Date.now().toString(36)+Math.random().toString(36).slice(2), notionId:undefined, done:false, doneDate:null, scheduledDate:null, createdAt:new Date().toISOString()};
      setTasks(prev => [...prev, copy]);
      syncTask(copy);
    }, [syncTask]);

    const handlePlanify = useCallback((taskId, date, slot) => {
      setTasks(prev => {
        const updated = prev.map(t => t.id===taskId ? {...t, scheduledDate:date, slot:slot||t.slot} : t);
        const task = updated.find(t=>t.id===taskId);
        if (task) syncTask(task);
        return updated;
      });
    }, [syncTask]);

    const handleStartTimer = useCallback((task) => {
      setTimer({ taskId:task.id, taskTitle:task.title, remaining:task.duration*60, total:task.duration*60, paused:false });
    }, []);

    const handleAddCustomCat    = useCallback((cat) => setCustomCats(p=>[...p,cat]), []);
    const handleDeleteCustomCat = useCallback((id) => {
      setCustomCats(p=>p.filter(c=>c.id!==id));
      setTasks(p=>p.map(t=>({...t,categories:(t.categories||[]).filter(c=>c!==id)})));
    }, []);

    const openAdd = (slot=null, date=null) => { setDefSlot(slot); setDefDate(date); setEditTask(null); setPrefill(''); setShowForm(true); };

    const handleVoiceFab = () => {
      if (voiceOn) { voiceStop(); return; }
      const ok = voiceStart(text => { setPrefill(text); setDefSlot('Flexible'); setDefDate(null); setEditTask(null); setShowForm(true); });
      if (!ok) alert("Reconnaissance vocale non disponible.\nEssaie Chrome desktop ou Android Chrome.");
    };

    return (
      <div style={{paddingTop: timer ? 56 : 0}}>
        {timer && (
          <TimerBanner timer={timer}
            onPause={() => setTimer(p=>({...p,paused:!p.paused}))}
            onFinish={() => { handleToggle(timer.taskId); setTimer(null); }}
            onCancel={() => setTimer(null)}
          />
        )}

        {voiceOn && (
          <div className="listen-overlay">
            <div className="listen-ring">🎙️</div>
            <div className="listen-text">J'écoute…</div>
            <div className="listen-hint">Dis le titre de ta tâche</div>
            <button className="listen-cancel" onClick={voiceStop}>Annuler</button>
          </div>
        )}

        {tab==='day' && <CalendarStrip selectedDate={selectedDate} onSelectDate={setSelectedDate} tasks={tasks} />}
        {(tab==='backlog' || tab==='fait') && (
          <div className="header">
            <div className="header-row">
              <div>
                <div className="day-name">{tab==='fait' ? 'Fait' : 'Mes tâches'}</div>
                <div className="date-sub">{getDayName()} {getDateStr()}</div>
              </div>
              {syncing && (
                <div style={{fontSize:11,color:'var(--muted)',display:'flex',alignItems:'center',gap:5,marginTop:8}}>
                  <span style={{display:'inline-block',animation:'spin 1s linear infinite'}}>↻</span> sync…
                </div>
              )}
            </div>
          </div>
        )}

        {tab==='day'     && <DayView tasks={tasks} allCats={allCats} onToggle={handleToggle} onMenu={setCtxTask} onAddToSlot={s=>openAdd(s,selectedDate)} selectedDate={selectedDate} />}
        {tab==='backlog' && <BacklogView tasks={tasks} allCats={allCats} onToggle={handleToggle} onMenu={setCtxTask} />}
        {tab==='fait'    && <DoneView tasks={tasks} allCats={allCats} onToggle={handleToggle} onMenu={setCtxTask} />}

        <div className="tabs">
          {[{id:'day',label:'Planning',icon:'📅'},{id:'backlog',label:'À faire',icon:'✦'},{id:'fait',label:'Fait',icon:'✓'}].map(t=>(
            <button key={t.id} className={`tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
              <span className="tab-icon">{t.icon}</span>
              {t.label}
            </button>
          ))}
        </div>

        <div className="fab-area">
          {voiceOk && (
            <button className={`fab-voice ${voiceOn?'listening':''}`} onClick={handleVoiceFab}>
              {voiceOn?'🎙️':'🎤'}
              <span className="fab-voice-label">Parler</span>
            </button>
          )}
          <button className="fab" onClick={()=>tab==='day'?openAdd(null,selectedDate):openAdd()}>+</button>
        </div>

        {ctxTask && (
          <ContextMenu task={ctxTask}
            onClose={() => setCtxTask(null)}
            onPlanify={() => setPlanTask(ctxTask)}
            onUnschedule={() => handlePlanify(ctxTask.id, null, ctxTask.slot)}
            onEdit={() => { setEditTask(ctxTask); setShowForm(true); }}
            onDuplicate={() => handleDuplicate(ctxTask)}
            onStartTimer={() => handleStartTimer(ctxTask)}
            onDelete={() => handleDelete(ctxTask.id)}
          />
        )}

        {planTask && (
          <PlanifySheet task={planTask}
            onClose={() => setPlanTask(null)}
            onPlanify={(date, slot) => { handlePlanify(planTask.id, date, slot); setPlanTask(null); }}
          />
        )}

        {showForm && (
          <TaskFormSheet
            initial={editTask ? {...editTask, prefillTitle: prefill||undefined} : (prefill ? {title:prefill} : null)}
            onClose={() => { setShowForm(false); setEditTask(null); setPrefill(''); }}
            onSave={handleSaveTask}
            allCats={allCats}
            customCatIds={customCatIds}
            onAddCustomCat={handleAddCustomCat}
            onDeleteCustomCat={handleDeleteCustomCat}
            defaultSlot={defSlot}
            defaultDate={defDate}
          />
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
